substitutions:
  _SERVICE_NAME: trail-info-develop

steps:
  - name: "gcr.io/cloud-builders/docker"
    id: "build-server"
    waitFor: ["-"]
    args:
      - "build"
      - "--cache-from"
      - "asia-northeast1-docker.pkg.dev/$PROJECT_ID/trail-info/$BRANCH_NAME:latest"
      - "--target=server"
      - "-t"
      - "asia-northeast1-docker.pkg.dev/$PROJECT_ID/trail-info/$BRANCH_NAME:$COMMIT_SHA"
      - "-t"
      - "asia-northeast1-docker.pkg.dev/$PROJECT_ID/trail-info/$BRANCH_NAME:latest"
      - "-f"
      - "Dockerfile.prod"
      - "."
  - name: "gcr.io/cloud-builders/docker"
    id: "build-batch"
    waitFor: ["-"]
    args:
      - "build"
      - "--cache-from"
      - "asia-northeast1-docker.pkg.dev/$PROJECT_ID/trail-info/$BRANCH_NAME-batch:latest"
      - "--target=batch"
      - "-t"
      - "asia-northeast1-docker.pkg.dev/$PROJECT_ID/trail-info/$BRANCH_NAME-batch:$COMMIT_SHA"
      - "-t"
      - "asia-northeast1-docker.pkg.dev/$PROJECT_ID/trail-info/$BRANCH_NAME-batch:latest"
      - "-f"
      - "Dockerfile.prod"
      - "."

  - name: "gcr.io/cloud-builders/docker"
    id: "push-server"
    waitFor: ["build-server"]
    args:
      - "push"
      - "--all-tags"
      - "asia-northeast1-docker.pkg.dev/$PROJECT_ID/trail-info/$BRANCH_NAME"
  - name: "gcr.io/cloud-builders/docker"
    id: "push-batch"
    waitFor: ["build-batch"]
    args:
      - "push"
      - "--all-tags"
      - "asia-northeast1-docker.pkg.dev/$PROJECT_ID/trail-info/$BRANCH_NAME-batch"

  - name: "asia.gcr.io/google.com/cloudsdktool/google-cloud-cli:stable"
    id: "deploy-migrate-job"
    waitFor: ["push-server"]
    secretEnv: ["DJANGO_SECRET_KEY", "DATABASE_URL"]
    entrypoint: "gcloud"
    args:
      - "run"
      - "jobs"
      - "deploy"
      - "trail-info-$BRANCH_NAME-migrate"
      - "--image=asia-northeast1-docker.pkg.dev/$PROJECT_ID/trail-info/$BRANCH_NAME:$COMMIT_SHA"
      - "--region=asia-northeast1"
      - "--task-timeout=1200s"
      - "--update-env-vars=DJANGO_SECRET_KEY=$$DJANGO_SECRET_KEY,DATABASE_URL=$$DATABASE_URL"
      - "--command=uv"
      - "--args=run,--frozen,--no-dev,manage.py,migrate"
  - name: "asia.gcr.io/google.com/cloudsdktool/google-cloud-cli:stable"
    id: "deploy-sync-job"
    waitFor: ["push-batch"]
    secretEnv: ["DJANGO_SECRET_KEY", "DATABASE_URL", "GEMINI_API_KEY", "LANGSMITH_API_KEY", "SLACK_WEBHOOK_URL"]
    entrypoint: "gcloud"
    args:
      - "run"
      - "jobs"
      - "deploy"
      - "trail-info-$BRANCH_NAME-run-sync"
      - "--image=asia-northeast1-docker.pkg.dev/$PROJECT_ID/trail-info/$BRANCH_NAME-batch:$COMMIT_SHA"
      - "--region=asia-northeast1"
      - "--update-env-vars=DJANGO_SECRET_KEY=$$DJANGO_SECRET_KEY,DATABASE_URL=$$DATABASE_URL,GEMINI_API_KEY=$$GEMINI_API_KEY,LANGSMITH_API_KEY=$$LANGSMITH_API_KEY,SLACK_WEBHOOK_URL=$$SLACK_WEBHOOK_URL"
      - "--command=uv"
      - "--args=run,--frozen,--no-dev,manage.py,trail_sync"
  - name: "asia.gcr.io/google.com/cloudsdktool/google-cloud-cli:stable"
    id: "deploy-blog-sync-job"
    waitFor: ["push-batch"]
    secretEnv: ["DJANGO_SECRET_KEY", "DATABASE_URL"]
    entrypoint: "gcloud"
    args:
      - "run"
      - "jobs"
      - "deploy"
      - "trail-info-$BRANCH_NAME-run-blog-sync"
      - "--image=asia-northeast1-docker.pkg.dev/$PROJECT_ID/trail-info/$BRANCH_NAME-batch:$COMMIT_SHA"
      - "--region=asia-northeast1"
      - "--update-env-vars=DJANGO_SECRET_KEY=$$DJANGO_SECRET_KEY,DATABASE_URL=$$DATABASE_URL"
      - "--command=uv"
      - "--args=run,--frozen,--no-dev,manage.py,blog_sync"

  - name: "asia.gcr.io/google.com/cloudsdktool/google-cloud-cli:stable"
    id: "execute-migrate"
    waitFor: ["deploy-migrate-job"]
    entrypoint: "gcloud"
    args:
      - "run"
      - "jobs"
      - "execute"
      - "trail-info-$BRANCH_NAME-migrate"
      - "--region=asia-northeast1"
      - "--wait"
      - "--task-timeout=20m"

  - name: "asia.gcr.io/google.com/cloudsdktool/google-cloud-cli:stable"
    id: "deploy-service"
    waitFor: ["execute-migrate"]
    secretEnv: ["DJANGO_SECRET_KEY", "DATABASE_URL"]
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "${_SERVICE_NAME}"
      - "--image=asia-northeast1-docker.pkg.dev/$PROJECT_ID/trail-info/$BRANCH_NAME:$COMMIT_SHA"
      - "--region=asia-northeast1"
      - "--update-env-vars=DJANGO_SECRET_KEY=$$DJANGO_SECRET_KEY,DATABASE_URL=$$DATABASE_URL"

images:
  - "asia-northeast1-docker.pkg.dev/$PROJECT_ID/trail-info/$BRANCH_NAME:$COMMIT_SHA"
  - "asia-northeast1-docker.pkg.dev/$PROJECT_ID/trail-info/$BRANCH_NAME:latest"

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/$_DJANGO_SECRET_KEY/versions/latest
      env: "DJANGO_SECRET_KEY"
    - versionName: projects/$PROJECT_ID/secrets/$_DATABASE_URL/versions/latest
      env: "DATABASE_URL"
    - versionName: projects/$PROJECT_ID/secrets/GEMINI_API_KEY/versions/latest
      env: "GEMINI_API_KEY"
    - versionName: projects/$PROJECT_ID/secrets/LANGSMITH_API_KEY/versions/latest
      env: "LANGSMITH_API_KEY"
    - versionName: projects/$PROJECT_ID/secrets/SLACK_WEBHOOK_URL/versions/latest
      env: "SLACK_WEBHOOK_URL"


options:
  logging: CLOUD_LOGGING_ONLY
